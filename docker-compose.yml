services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: winform-backend
    env_file:
      - .env
    ports:
      - "${PORT:-3001}:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - winform-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: winform-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - winform-network
    restart: unless-stopped

networks:
  winform-network:
    driver: bridge
